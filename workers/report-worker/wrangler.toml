name = "report-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# The Cloudflare Cron Trigger (Runs daily at midnight UTC)
[triggers]
crons = ["0 0 * * *"]

[[queues.consumers]]
queue = "google-ads-reports"
max_batch_size = 1
max_retries = 3 # Cloudflare will automatically retry if Vercel fails

[[queues.producers]]
queue = "google-ads-reports"
binding = "REPORT_QUEUE"