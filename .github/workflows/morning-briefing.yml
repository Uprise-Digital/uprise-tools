name: Daily Morning Briefing

on:
  # Runs daily at 20:00 UTC (which corresponds to 6:00 AM AEST / 7:00 AM AEDT Melbourne time)
  schedule:
    - cron: '0 20 * * *'

  # This allows you to click a "Run workflow" button manually from the GitHub UI for testing
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Morning Briefing API Route
        run: |
          # We use curl to send a POST request to your API route
          # The -f flag makes curl fail if the HTTP status code is 400 or above
          # The -s flag makes it silent (less log clutter)
          # The -S flag shows errors if it fails
          curl -f -s -S -X POST "${{ secrets.PRODUCTION_APP_URL }}/api/cron/morning-briefing" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
